name: Checkout release gate

on:
  workflow_dispatch:
  deployment_status:

permissions:
  contents: read

jobs:
  checkout-release-passport:
    if: github.event_name == 'workflow_dispatch' || github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create pre-release checkout evidence
        uses: Muhammad02-dev/checkout-release-passport@v0.2.0
        with:
          config_path: .checkout-evidence/staging.json
          ack_authorized: "true"
          install_browser: "true"
          fail_on_review: "true"
